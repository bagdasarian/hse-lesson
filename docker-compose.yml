services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 2s
      timeout: 5s
      retries: 10
    env_file:
      - .env

  migrate:
    image: migrate/migrate
    volumes:
      - ./migrations:/migrations
    command: >
      -path=/migrations
      -database=postgres://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSLMODE}
      up
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env

  app:
    build: .
    container_name: app
    ports:
      - "${APP_PORT}:8080"
    environment:
      DB_DSN: postgres://${DB_USER}:${DB_PASSWORD}@postgres:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSLMODE}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env

volumes:
  postgres_data: